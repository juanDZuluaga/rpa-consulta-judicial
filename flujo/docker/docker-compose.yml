version: '3.8'

services:

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
    volumes:
      - n8n_data:/home/node/.n8n
      - ./logs:/logs
    depends_on:
      - browserless
      - postgres   # 👈 AGREGA ESTO
    restart: unless-stopped

  browserless:
    image: browserless/chrome:latest
    container_name: browserless
    ports:
      - "3000:3000"
    environment:
      - MAX_CONCURRENT_SESSIONS=5
      - MAX_QUEUE_LENGTH=10
      - TIMEOUT=60000
      - KEEP_ALIVE=true
    restart: unless-stopped

  # 👇 ESTE ES EL NUEVO SERVICIO
  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: n8n123
      POSTGRES_DB: logs_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

# 👇 VOLUMENES
volumes:
  n8n_data:
    external: true
    name: docker_n8n_data
  postgres_data:   # 👈 AGREGA ESTE